services:
  backend:
    build: ./backend
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - CLICKHOUSE_ENABLED=${CLICKHOUSE_ENABLED:-false}
      - CLICKHOUSE_HOST=${CLICKHOUSE_HOST:-}
      - CLICKHOUSE_DATABASE=${CLICKHOUSE_DATABASE:-rag_logs}
      - CLICKHOUSE_USERNAME=${CLICKHOUSE_USERNAME:-default}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:-}
      - CLICKHOUSE_STRICT=${CLICKHOUSE_STRICT:-false}
      - CLICKHOUSE_LOG_RAW_PAYLOADS=${CLICKHOUSE_LOG_RAW_PAYLOADS:-false}
      - CLICKHOUSE_CONNECT_TIMEOUT_SECONDS=${CLICKHOUSE_CONNECT_TIMEOUT_SECONDS:-5}
      - CLICKHOUSE_READ_TIMEOUT_SECONDS=${CLICKHOUSE_READ_TIMEOUT_SECONDS:-15}
      - CLICKHOUSE_INIT_MAX_RETRIES=${CLICKHOUSE_INIT_MAX_RETRIES:-2}
      - CLICKHOUSE_INIT_RETRY_BACKOFF_SECONDS=${CLICKHOUSE_INIT_RETRY_BACKOFF_SECONDS:-1}
    volumes:
      - ./backend:/app
    depends_on:
      qdrant:
        condition: service_healthy
    restart: "no"

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "bash -ec 'exec 3<>/dev/tcp/127.0.0.1/6333; printf \"GET /readyz HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n\" >&3; read -r status <&3; [[ \"$$status\" == *\" 200 \"* ]]'",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: "no"

  frontend:
    build: ./frontend
    user: "${UID:-1001}:${GID:-1001}"
    command: npm run dev -- --hostname 0.0.0.0 --port 3000
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - NEXT_PUBLIC_API_BASE_URL=/api
      - API_INTERNAL_BASE_URL=http://backend:8000
      - WATCHPACK_POLLING=true # check for later
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    restart: "no"

  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --protocol http2 --no-autoupdate run --token ${CLOUDFLARED_TOKEN:?Set CLOUDFLARED_TOKEN in .env}
    depends_on:
      - frontend
    restart: "no"

  test:
    build:
      context: ./backend
      target: test
    env_file:
      - .env
    environment:
      - ALLOW_INMEMORY_REPOSITORY=true
      - TRANSFORMERS_OFFLINE=1
      - HF_DATASETS_OFFLINE=1
      - SUPABASE_URL=
      - SUPABASE_SERVICE_ROLE_KEY=
      - CLICKHOUSE_ENABLED=false
    profiles:
      - test

volumes:
  qdrant_data:
